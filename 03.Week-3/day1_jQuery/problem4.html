<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive To-Do List</title>
</head>
<body>

<h2>To-Do List</h2>

<input type="text" id="taskInput" placeholder="Enter task">
<button id="addBtn">Add</button>

<ul id="taskList"></ul>

<div>
    Total Tasks: <span id="totalCount">0</span> |
    Completed: <span id="completedCount">0</span>
</div>
 <script src="https://code.jquery.com/jquery-3.6.1.min.js"></script>

<script>
$(function () {
    function updateCounts() {
        let total = $("#taskList li").length;
        let completed = $("#taskList li.completed").length;

        $("#totalCount").text(total);
        $("#completedCount").text(completed);
    }

    $("#addBtn").on("click", function () {
        let taskText = $("#taskInput").val().trim();
        if (taskText === "") return;

        let newTask = `
            <li>
                <span class="task-text">${taskText}</span>
                <button class="completeBtn">Complete</button>
                <button class="deleteBtn">Delete</button>
            </li>
        `;

        $("#taskList").append(newTask);
        $("#taskInput").val(""); // Clear input
        updateCounts();
    });

    $("#taskList").on("click", ".completeBtn", function () {
        $(this).parent().toggleClass("completed");
        if($(this).parent().hasClass("completed")){
            $(this).parent().css("text-decoration", "line-through");
        } else {
            $(this).parent().css("text-decoration", "none");
        }
        updateCounts();
    });

    $("#taskList").on("click", ".deleteBtn", function () {
        $(this).parent().remove();
        updateCounts();
    });

});
</script>

</body>
</html>
