<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cart</title>
</head>
<style>
    .container{
        display: flex;
        gap:30px;
        align-items: center;
    }
     .c1{
        border: 2px solid black;
        padding: 10px;
        text-align: center;
    }
    
</style>
<body>
    <h1 style="text-align: center;">products</h1>
    <h3 id="count">count:</h3>
<div class="container">
    

    <div class="c1">
        <img src="./laptop.webp" alt="laptop" width="300px" height="150px">
         <br><br>
        <input type="button" value="Add to cart" class="bt1">
        <p class="msg"></p>
       
    </div>
        <div class="c1">
        <img src="./gaming mouse.webp" alt="gaming mouse" width="300px" height="150px">
        <br><br>
        <input type="button" value="Add to cart" class="bt1">
        <p class="msg"></p>
    </div>
        <div class="c1">
        <img src="./bluetooth speaker.webp" alt="bluetooth speaker" width="300px" height="150px">
        <br><br>
        <input type="button" value="Add to cart" class="bt1">
        <p class="msg"></p>
    </div>
        <div class="c1">
        <img src="./bluetooth speaker.webp" alt="bluetooth speaker" width="300px" height="150px">
        <br><br>
        <input type="button" value="Add to cart" class="bt1">
        <p class="msg"></p>
    </div>
    
       
    </div>
    
 <script  src="https://code.jquery.com/jquery-3.6.1.min.js"></script>
<script>
    $(document).ready(function(){

    let count = 0;

    $(".c1").on("click", ".bt1", function(){

        count++;
        $("#count").text("count:"+count);

        $(this).attr("value", "Added");

        $(this).siblings(".msg").text("Added to cart").css("color","green");
        

    });

});
</script>
    
</body>
</html>
